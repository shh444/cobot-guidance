<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="1160" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="panel-left" x1="40" y1="130" x2="690" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FDF4"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="panel-right" x1="720" y1="130" x2="1140" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1140" height="600" rx="24" fill="url(#bg)" stroke="#CBD5E1"/>

  <text x="60" y="72" fill="#0F172A" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    TCP Concept with Tool Examples
  </text>
  <text x="60" y="104" fill="#334155" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    TCP changes by tool shape: gripper, welding torch, suction cup all have different TCP position and direction.
  </text>

  <!-- Main concept panel -->
  <rect x="40" y="130" width="650" height="380" rx="20" fill="url(#panel-left)" stroke="#86EFAC"/>
  <text x="68" y="166" fill="#166534" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Main TCP Concept
  </text>

  <!-- Robot base -->
  <ellipse cx="170" cy="420" rx="96" ry="34" fill="#CBD5E1" stroke="#64748B" stroke-width="2"/>
  <rect x="128" y="340" width="84" height="84" rx="16" fill="#94A3B8" stroke="#475569" stroke-width="2"/>
  <text x="93" y="472" fill="#0F172A" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
    Robot Base
  </text>

  <!-- Robot arm -->
  <line x1="170" y1="360" x2="284" y2="296" stroke="#0F766E" stroke-width="22" stroke-linecap="round"/>
  <line x1="284" y1="296" x2="394" y2="252" stroke="#14B8A6" stroke-width="20" stroke-linecap="round"/>
  <line x1="394" y1="252" x2="485" y2="240" stroke="#2DD4BF" stroke-width="18" stroke-linecap="round"/>
  <circle cx="170" cy="360" r="15" fill="#0F766E"/>
  <circle cx="284" cy="296" r="13" fill="#0F766E"/>
  <circle cx="394" cy="252" r="12" fill="#0F766E"/>
  <circle cx="485" cy="240" r="10" fill="#0F766E"/>

  <!-- Flange and tool -->
  <circle cx="530" cy="234" r="20" fill="#E2E8F0" stroke="#334155" stroke-width="2.5"/>
  <g transform="translate(534 234) rotate(-10)">
    <rect x="-2" y="-11" width="124" height="22" rx="10" fill="#64748B" stroke="#334155" stroke-width="2"/>
    <rect x="120" y="-7" width="26" height="14" rx="4" fill="#475569" stroke="#1E293B" stroke-width="1.8"/>
  </g>
  <circle cx="675" cy="208" r="7" fill="#DC2626"/>
  <circle cx="675" cy="208" r="12" stroke="#FCA5A5" stroke-width="2.5"/>
  <text x="688" y="212" fill="#991B1B" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700">TCP</text>

  <line x1="548" y1="228" x2="664" y2="210" stroke="#475569" stroke-width="2.3" stroke-dasharray="7 6" marker-end="url(#arrow-dark)"/>
  <text x="538" y="272" fill="#334155" font-size="15" font-family="Segoe UI, Arial, sans-serif">TCP offset (flange to tool tip)</text>
  <line x1="710" y1="208" x2="760" y2="208" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="699" y="186" fill="#1D4ED8" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Approach direction</text>

  <text x="500" y="197" fill="#1E293B" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Flange</text>

  <!-- Axis hint -->
  <line x1="78" y1="410" x2="118" y2="410" stroke="#1D4ED8" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="78" y1="410" x2="78" y2="374" stroke="#1D4ED8" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="123" y="415" fill="#1D4ED8" font-size="13" font-family="Segoe UI, Arial, sans-serif">X</text>
  <text x="68" y="369" fill="#1D4ED8" font-size="13" font-family="Segoe UI, Arial, sans-serif">Z</text>

  <!-- Tool examples panel -->
  <rect x="720" y="130" width="420" height="380" rx="20" fill="url(#panel-right)" stroke="#CBD5E1"/>
  <text x="748" y="166" fill="#0F172A" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    TCP Examples by Tool
  </text>

  <!-- Card 1: Gripper -->
  <rect x="742" y="186" width="378" height="96" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="762" y="212" fill="#0F172A" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Gripper</text>
  <circle cx="826" cy="236" r="7" fill="#94A3B8"/>
  <line x1="833" y1="236" x2="888" y2="236" stroke="#64748B" stroke-width="10" stroke-linecap="round"/>
  <rect x="886" y="220" width="46" height="8" rx="2" fill="#475569"/>
  <rect x="886" y="244" width="46" height="8" rx="2" fill="#475569"/>
  <circle cx="932" cy="236" r="5" fill="#DC2626"/>
  <circle cx="932" cy="236" r="9" stroke="#FCA5A5" stroke-width="1.8"/>
  <text x="947" y="240" fill="#7F1D1D" font-size="13" font-family="Segoe UI, Arial, sans-serif">TCP at fingertip center</text>

  <!-- Card 2: Welding torch -->
  <rect x="742" y="292" width="378" height="96" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="762" y="318" fill="#0F172A" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Welding Torch</text>
  <circle cx="826" cy="342" r="7" fill="#94A3B8"/>
  <line x1="833" y1="342" x2="895" y2="330" stroke="#64748B" stroke-width="9" stroke-linecap="round"/>
  <line x1="895" y1="330" x2="924" y2="347" stroke="#64748B" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="926" cy="348" r="5" fill="#DC2626"/>
  <circle cx="926" cy="348" r="9" stroke="#FCA5A5" stroke-width="1.8"/>
  <line x1="934" y1="352" x2="943" y2="359" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="934" y1="352" x2="948" y2="353" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="934" y1="352" x2="943" y2="344" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <text x="956" y="347" fill="#7F1D1D" font-size="13" font-family="Segoe UI, Arial, sans-serif">TCP at wire tip</text>

  <!-- Card 3: Suction cup -->
  <rect x="742" y="398" width="378" height="96" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="762" y="424" fill="#0F172A" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Suction Cup</text>
  <circle cx="826" cy="448" r="7" fill="#94A3B8"/>
  <line x1="833" y1="448" x2="902" y2="448" stroke="#64748B" stroke-width="9" stroke-linecap="round"/>
  <rect x="902" y="442" width="18" height="12" rx="3" fill="#475569"/>
  <ellipse cx="921" cy="448" rx="10" ry="7" fill="#60A5FA" stroke="#2563EB" stroke-width="1.6"/>
  <circle cx="921" cy="448" r="4.5" fill="#DC2626"/>
  <circle cx="921" cy="448" r="8.5" stroke="#FCA5A5" stroke-width="1.6"/>
  <text x="936" y="452" fill="#7F1D1D" font-size="13" font-family="Segoe UI, Arial, sans-serif">TCP at cup center</text>

</svg>
